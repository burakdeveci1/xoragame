<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora'ya Özel: Selena Form Master</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0118; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }
        #game-container { 
            position: relative; 
            width: 600px; 
            height: 400px; 
            border: 3px solid #7d2ae8; 
            background: linear-gradient(to bottom, #1a0b2e, #0a0118); 
            overflow: hidden; 
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(125, 42, 232, 0.4);
        }
        #player { 
            position: absolute; 
            bottom: 20px; 
            left: 50px; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            transition: transform 0.1s, background 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            border: 4px solid;
            z-index: 5;
            font-size: 14px;
        }
        
        /* Selena Formları */
        .elf { background: #e0f7fa; border-color: #00bcd4; color: #006064; box-shadow: 0 0 25px #00bcd4; }
        .abyss { background: #4a148c; border-color: #7d2ae8; color: white; box-shadow: 0 0 25px #7d2ae8; }

        .object { position: absolute; width: 35px; height: 35px; border-radius: 50%; }
        
        .score-board { font-size: 28px; margin-bottom: 10px; font-weight: bold; color: #b39ddb; }
        .instructions { margin-bottom: 20px; color: #888; font-size: 0.9em; }
        
        #msg-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            display: none; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            z-index: 10; 
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            background: #7d2ae8; color: white; border: none; padding: 12px 25px;
            border-radius: 25px; font-size: 16px; cursor: pointer; margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #9d50f0; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="score-board">Skor: <span id="scoreVal">0</span></div>
    <div class="instructions">Form değiştirmek için <b>BOŞLUK</b> tuşuna bas veya <b>EKRANA TIKLA</b>!</div>

    <div id="game-container">
        <div id="msg-overlay">
            <div id="status-content"></div>
            <button onclick="resetGame()">Tekrar Dene</button>
        </div>
        <div id="player" class="elf">ELF</div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreVal = document.getElementById('scoreVal');
        const msgOverlay = document.getElementById('msg-overlay');
        const statusContent = document.getElementById('status-content');
        
        let score = 0;
        let isAbyss = false;
        let gameActive = true;
        let speed = 4;
        let spawnRate = 1500;
        let gameTimer;

        function toggleForm() {
            if(!gameActive) return;
            isAbyss = !isAbyss;
            if(isAbyss) {
                player.className = 'abyss';
                player.innerText = 'ABYSS';
            } else {
                player.className = 'elf';
                player.innerText = 'ELF';
            }
        }

        // Kontroller
        document.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); toggleForm(); } });
        container.addEventListener('mousedown', (e) => { e.preventDefault(); toggleForm(); });

        function createObject() {
            if(!gameActive) return;

            const obj = document.createElement('div');
            const isAbyssObj = Math.random() > 0.5;
            obj.className = 'object ' + (isAbyssObj ? 'abyss' : 'elf');
            
            // Rastgele dikey konum
            obj.style.right = '-50px';
            obj.style.top = Math.random() * (350 - 50) + 50 + 'px';
            container.appendChild(obj);

            let pos = -50;
            const moveInterval = setInterval(() => {
                if(!gameActive) { clearInterval(moveInterval); obj.remove(); return; }
                
                pos += speed;
                obj.style.right = pos + 'px';

                const playerRect = player.getBoundingClientRect();
                const objRect = obj.getBoundingClientRect();

                // Çarpışma Analizi
                if (objRect.left < playerRect.right && objRect.right > playerRect.left &&
                    objRect.top < playerRect.bottom && objRect.bottom > playerRect.top) {
                    
                    if((isAbyssObj && isAbyss) || (!isAbyssObj && !isAbyss)) {
                        score++;
                        scoreVal.innerText = score;
                        speed += 0.15; // Her puanla biraz daha hızlanır
                        obj.remove();
                        clearInterval(moveInterval);
                    } else {
                        gameOver();
                    }
                }

                if(pos > 650) {
                    obj.remove();
                    clearInterval(moveInterval);
                }
            }, 20);
        }

        function gameOver() {
            gameActive = false;
            msgOverlay.style.display = 'flex';
            
            if(score >= 20) {
                statusContent.innerHTML = `
                    <h2 style="color: #ffeb3b; font-size: 2em; margin: 0;">🏆 TEBRİKLER XORA! 🏆</h2>
                    <p style="font-size: 1.2em; color: #fff; line-height: 1.6;">
                        Gerçek bir Selena main olduğunu kanıtladın.<br>
                        <span style="color: #00ff00; font-weight: bold; font-size: 1.4em;">
                            Ödülünüz: 1 Adet Burak Deveci Kazandınız! 🎁
                        </span>
                    </p>
                `;
            } else {
                statusContent.innerHTML = `
                    <h2 style="color: #ff4444; margin: 0;">OYUN BİTTİ</h2>
                    <p style="font-size: 1.1em;">Skorun: ${score}</p>
                    <p style="color: #aaa;">Ödülü kazanmak için 20 puan yapmalısın!</p>
                `;
            }
        }

        function resetGame() {
            score = 0;
            speed = 4;
            scoreVal.innerText = "0";
            gameActive = true;
            msgOverlay.style.display = 'none';
            isAbyss = false;
            player.className = 'elf';
            player.innerText = 'ELF';
            document.querySelectorAll('.object').forEach(o => o.remove());
        }

        // Objeleri oluşturmaya başla
        gameTimer = setInterval(createObject, 1500);
    </script>
</body>
</html>
